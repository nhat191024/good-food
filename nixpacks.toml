[phases.setup]
nixPkgs = [
    "(php84.withExtensions ({ enabled, all, ... }: enabled ++ (with all; [ zip pdo_mysql gd bcmath intl pcntl exif opcache imagick openssl ])))",
    "nginx",
    "libmysqlclient",
    "php84Packages.composer",
    "nodejs_22",
    "openssh",
    "python311Packages.supervisor",
]

[phases.install]
cmds = [
    "mkdir -p /var/log/nginx && mkdir -p /var/cache/nginx",
    "composer install --ignore-platform-reqs --no-interaction --no-scripts",
    "npm ci",
]

[phases.build]
cmds = [
    "npm run build",
    "mkdir -p /etc/supervisor/conf.d/",
    "cp /assets/worker-*.conf /etc/supervisor/conf.d/",
    "cp /assets/supervisord.conf /etc/supervisord.conf",
    "chmod +x /assets/start.sh",
]

[start]
cmd = '/assets/start.sh'

[staticAssets]
"start.sh" = '''
#!/bin/bash
set -e

echo "Starting Laravel application setup..."

# Run storage link
php /app/artisan storage:link

# Set proper permissions
echo "Setting permissions..."
chgrp -R www-data /app/storage /app/bootstrap/cache /app/public
chmod -R g+w /app/storage /app/bootstrap/cache /app/public
find /app/storage -type d -exec chmod g+s {} +
find /app/bootstrap/cache -type d -exec chmod g+s {} +

# Clear and cache configurations
echo "Clearing and caching configurations..."
php /app/artisan optimize:clear

# Cache for production
echo "Caching for production..."
php /app/artisan optimize

# Transform the nginx configuration
node /assets/scripts/prestart.mjs /assets/nginx.template.conf /etc/nginx.conf

echo "Laravel application setup completed!"

# Start supervisor
supervisord -c /etc/supervisord.conf -n
'''

"supervisord.conf" = '''
[unix_http_server]
file=/assets/supervisor.sock

[supervisord]
logfile=/var/log/supervisord.log
logfile_maxbytes=50MB
logfile_backups=10
loglevel=info
pidfile=/assets/supervisord.pid
nodaemon=false
silent=false
minfds=1024
minprocs=200

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///assets/supervisor.sock

[include]
files = /etc/supervisor/conf.d/*.conf
'''

"worker-nginx.conf" = '''
[program:worker-nginx]
process_name=%(program_name)s_%(process_num)02d
command=bash -c 'exec nginx -c /etc/nginx.conf'
autostart=true
autorestart=true
stdout_logfile=/var/log/worker-nginx.log
stderr_logfile=/var/log/worker-nginx.log
'''

"worker-phpfpm.conf" = '''
[program:worker-phpfpm]
process_name=%(program_name)s_%(process_num)02d
command=php-fpm -y /assets/php-fpm.conf -F
autostart=true
autorestart=true
stdout_logfile=/var/log/worker-phpfpm.log
stderr_logfile=/var/log/worker-phpfpm.log
'''

"worker-laravel-queue.conf" = '''
[program:worker-laravel-queue]
process_name=%(program_name)s_%(process_num)02d
command=bash -c 'exec php /app/artisan queue:work redis --queue=default,media,messages,notifications --sleep=3 --tries=3 --max-time=300 --memory=500 --timeout=300 --rest=1'
directory=/app
user=www-data
numprocs=2
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
startsecs=0
stopwaitsecs=60
stdout_logfile=/var/log/worker-laravel-queue.log
stderr_logfile=/var/log/worker-laravel-queue.log
'''

"worker-laravel-scheduler.conf" = '''
[program:worker-laravel-scheduler]
process_name=%(program_name)s_%(process_num)02d
command=bash -c 'exec php /app/artisan schedule:work'
directory=/app
user=www-data
autostart=true
autorestart=true
stdout_logfile=/var/log/worker-laravel-scheduler.log
stderr_logfile=/var/log/worker-laravel-scheduler.log
stopwaitsecs=60
'''

"php-fpm.conf" = '''
[www]
listen = 127.0.0.1:9000
user = www-data
group = www-data
listen.owner = www-data
listen.group = www-data
pm = dynamic
pm.max_children = 50
pm.min_spare_servers = 4
pm.max_spare_servers = 32
pm.start_servers = 18
clear_env = no
php_admin_value[upload_max_filesize] = 50M
php_admin_value[post_max_size] = 50M
php_admin_value[memory_limit] = 1024M
php_admin_value[max_input_time] = 300
php_admin_value[max_execution_time] = 300
php_admin_value[max_file_uploads] = 20
php_admin_value[max_input_vars] = 5000
'''

"nginx.template.conf" = '''
user www-data www-data;
worker_processes 5;
daemon off;

worker_rlimit_nofile 8192;

events {
  worker_connections  4096;  # Default: 1024
}

http {
    include    $!{nginx}/conf/mime.types;
    index    index.html index.htm index.php;

    default_type application/octet-stream;
    log_format   main '$remote_addr - $remote_user [$time_local]  $status '
        '"$request" $body_bytes_sent "$http_referer" '
        '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx-access.log;
    error_log /var/log/nginx-error.log;
    sendfile     on;
    tcp_nopush   on;
    server_names_hash_bucket_size 128; # this seems to be required for some vhosts

    server {
        listen ${PORT};
        listen [::]:${PORT};
        server_name localhost;

        $if(NIXPACKS_PHP_ROOT_DIR) (
            root ${NIXPACKS_PHP_ROOT_DIR};
        ) else (
            root /app;
        )

        add_header X-Content-Type-Options "nosniff";

        client_max_body_size 51M;

        index index.php;

        charset utf-8;

        $if(NIXPACKS_PHP_FALLBACK_PATH) (
            location / {
                try_files $uri $uri/ ${NIXPACKS_PHP_FALLBACK_PATH}?$query_string;
            }
        ) else (
          location / {
                try_files $uri $uri/ /index.php?$query_string;
           }
        )

        location = /favicon.ico { access_log off; log_not_found off; }
        location = /robots.txt  { access_log off; log_not_found off; }

        $if(IS_LARAVEL) (
            error_page 404 /index.php;
        ) else ()

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_buffer_size 8k;
            include $!{nginx}/conf/fastcgi_params;
            include $!{nginx}/conf/fastcgi.conf;
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
}
'''
